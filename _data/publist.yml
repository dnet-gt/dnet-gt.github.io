- title: "ICVul: a well-labeled C/C++ vulnerability dataset with comprehensive metadata and VCCS"
  # image: rock.jpg
  description: Machine learning-based software vulnerability detection requires high-quality datasets, which is essential for training effective models. To address challenges related to data label quality, diversity, and comprehensiveness, we constructed ICVul, a dataset emphasizing data quality and enriched with comprehensive metadata, including Vulnerability-Contributing Commits (VCCs). We began by filtering Common Vulnerabilities and Exposures from the NVD, retaining only those linked to GitHub fix commits. Then we extracted functions and files along with relevant metadata from these commits and used the SZZ algorithm to trace VCCs. To further enhance label reliability, we developed the ESC (Eliminate Suspicious Commit) technique, ensuring credible data labels. The dataset is stored in a relationallike database for improved usability and data integrity. Both ICVul and its construction framework are publicly accessible on GitHub, supporting research in related field.
  authors: Chaomeng Lu, Tianyu Li, Toon Dehaene, Bert Lagaisse
  link:
    url: https://doi.org/10.1109/MSR66628.2025.00034
    display: Paper DOI
  highlight: 1

- title: "A Multi-Dimensional Visual Analytics Tool for the Security Posture of Open-Source Software"
  # image: rock.jpg
  description: Open-source software is widely used by developers and businesses, but assessing its security posture is challenging due to the lack of time and specialized expertise. Existing visual security analysis tools for open-source projects primarily focus on vulnerabilities within the source code, lacking a comprehensive assessment of the project’s overall security posture. To address these issues, we propose a multi-dimensional visual analytics tool for evaluating the security posture of open-source projects. Our tool integrates data from code commits, contributor activity, and historical vulnerability duration, providing a holistic view of project security.Our tool integrates data from multiple sources, including the National Vulnerability Database (NVD) and GitHub commit histories, and applies the SZZ algorithm to identify both vulnerability-fixing and inducing commits. We tested the dashboard on two popular GitHub projects, each containing thousands of commits and hundreds of vulnerabilities, allowing users to easily track development and vulnerability management within each project. An evaluation study with experienced developers confirmed the dashboard’s effectiveness in helping users quickly understand developer interactions and the project’s overall approach to security management. Our contributions include a diverse vulnerability dataset and a visual dashboard that offers a multi-dimensional perspective on open-source project security, meeting the needs of various stakeholders.
  authors: Tianyu Li, Chaomeng Lu, Bert Lagaisse
  link:
    url: https://doi.ieeecomputersociety.org/10.1109/SVM66695.2025.00007
    display: Paper DOI
  highlight: 1

- title: "PrivacyBuddy: An Android Privacy Dashboard for Detecting Excessive Data Collection with a Focus on Location Data, Mobile Devices and Multimedia: Enabling Technologies, Algorithms, and Applications"
  # image: rock.jpg
  description: This paper presents PrivacyBuddy, an innovative Android privacy dashboard designed to detect excessive data collection, focusing on location data. It addresses the growing concern over apps that collect more personal information than necessary, often leading to privacy violations. Current Android privacy dashboards are inadequate, lacking effective visualizations and insights into app behavior. PrivacyBuddy enhances user awareness by providing intuitive visualizations of data collection frequency, volume, and type, along with a Privacy Score for each app. The dashboard employs user-centered design principles to cater to diverse user needs, from casual users to privacy-conscious individuals. Key features include detailed tracking of location requests, distinguishing between foreground and background access, and offering actionable insights for users to manage their privacy settings effectively. A secure implementation extends the Android OS to monitor data requests made by other apps. A user study validates the design, demonstrating improved usability and user engagement compared to existing solutions. This work contributes to the field of visual data analytics by merging design principles with practical applications, ultimately empowering users to take control of their data privacy in an increasingly data-driven world.
  authors: Toon Dehaene, Maxime Bellis, Tristan Pelgrims, Vincent Naessens, Bert Lagaisse
  link:
    url: doi.org/10.2352/EI.2025.37.3.MOBMU-328
    display: Paper DOI
  highlight: 0

- title: "From Lab to Reality: A Practical Evaluation of Deep Learning Models and LLMs for Vulnerability Detection"
  # image: rock.jpg
  description: Vulnerability detection methods based on deep learning (DL) have shown strong performance on benchmark datasets, yet their real-world effectiveness remains underexplored. Recent work suggests that both graph neural network (GNN)-based and transformer-based models, including large language models (LLMs), yield promising results when evaluated on curated benchmark datasets. These datasets are typically characterized by consistent data distributions and heuristic or partially noisy labels. In this study, we systematically evaluate two representative DL models-ReVeal and LineVul-across four representative datasets Juliet, Devign, BigVul, and ICVul. Each model is trained independently on each respective dataset, and their code representations are analyzed using t-SNE to uncover vulnerability related patterns. To assess realistic applicability, we deploy these models along with four pretrained LLMs, Claude 3.5 Sonnet, GPT-o3-mini, GPT-4o, and GPT-5 on a curated dataset, VentiVul, comprising 20 recently (May 2025) fixed vulnerabilities from the Linux kernel. Our experiments reveal that current models struggle to distinguish vulnerable from non-vulnerable code in representation space and generalize poorly across datasets with differing distributions. When evaluated on VentiVul, our newly constructed time-wise out-of-distribution dataset, performance drops sharply, with most models failing to detect vulnerabilities reliably. These results expose a persistent gap between academic benchmarks and real-world deployment, emphasizing the value of our deployment-oriented evaluation framework and the need for more robust code representations and higher-quality datasets.
  authors: Chaomeng Lu, Bert Lagaisse
  link:
    url: https://doi.org/10.48550/arXiv.2512.10485
    display: arXive Link
  highlight: 0

- title: "Enhancing Effective Bidirectional Isolation for Function Fusion in Serverless Architectures"
  # image: rock.jpg
  description: Serverless computing has emerged as a popular paradigm in modern cloud environments, offering flexibility and scalability to tenants. A serverless function might handle sensitive tenant data. Employing Trusted Execution Environment (TEE) techniques to protect such a function from untrusted cloud service providers is attractive for tenant privacy. However, this introduces response latency, thereby impacting the performance of function execution. This paper introduces Fundue, a serverless architecture with bidirectional isolation between tenant and cloud provider that achieves light-weight isolation of functions and reduces cold start latency by fusing functions. Fundue enables multiple functions uploaded by the same tenant to share a single execution environment embedded into the enclave. Fundue allocates separate memory for each serverless function within the execution environment and establishes robust isolation between functions through bounds checking mechanisms. We extensively evaluate Fundue with diverse workloads and representative serverless functions. Our results demonstrate a significant reduction in response latency of serverless function execution, ranging from 17.8% to 88.7% compared to AccTEE, an open-source two-way sandbox serverless framework. Additionally, Fundue mitigates vulnerabilities in existing execution environments, such as stack-based buffer overflows.
  authors: Tianyu Li, Chen Yingpeng, Donghui Yu, Yuanyuan Zhang, Bert Lagaisse
  link:
    url: https://doi.org/10.1145/3652892.3654778
    display: Paper DOI
  highlight: 0

- title: "BeauForT: Robust Byzantine Fault Tolerance for Client-centric Mobile Web Application"
  # image: rock.jpg
  description: In recent years, part of the web is shifting to a client-centric, decentralized model where web clients become the leading execution environment for application logic and data storage. However, current solutions to build decentralized web applications with multiple distrusting parties often involve a decentralized backend of servers running a BFT protocol between them. Existing consensus protocols using either all-to-all communication, or leader-based gossip suffer from performance degradation in unstable network conditions. In this paper, we present BeauForT, a purely browser-based platform for decentralized BFT consensus in client-centric, community-driven applications. We propose a novel, optimistic, leaderless, gossip-based consensus protocol, tolerating Byzantine replicas, combined with a robust and efficient state-based synchronization protocol. This protocol makes BeauForT well suited for the decentralized client-centric web and its dynamic nature with many network disruptions or node failures.
  authors: Kristof Jannes, Emad Heydari Beni, Bert Lagaisse, Wouter Joosen
  link:
    url: https://doi.org/10.1109/TPDS.2023.3241963
    display: Paper DOI
  highlight: 0

- title: "DEDACS: Decentralized and dynamic access control for smart contracts in a policy-based manner"
  # image: rock.jpg
  description: Distributed Ledger Technology (DLTs) or blockchains have been steadily emerging and providing innovation in the past decade for several use cases, ranging from financial networks, to notarization, or trustworthy execution via smart contracts. DLTs are enticing due to their properties of decentralization, non-repudiation, and auditability (transparency). These properties are of high potential to access control systems that can be implemented on-chain, and are executed without infringement and full transparency. While it remains uncertain which use cases will truly turn out to be viable, many use cases such as financial transactions can benefit from integrating certain restrictions via access control on the blockchain. In addition, smart contracts may in the future present security risks that are currently yet unknown. As a solution, access control policies can provide flexibility in the execution flow when adopted by smart contracts. In this paper, we present our DEDACS architecture which provides decentralized and dynamic access control for smart contracts in a policy-based manner. Our access control is expressive as it features policies, and dynamic as the environment or users can be changed, or alternative policies can be assigned to smart contracts. DEDACS ensures that our access control preserves the desired properties of decentralization and transparency, while aiming to keep the costs involved as minimal as possible. We have evaluated DEDACS in the context of a Uniswap token-exchange platform, in which we evaluated the costs related to (i) the introduced overhead at deployment time and (ii) the operational overhead cost. DEDACS introduces a relative overhead of on average 52% at deployment time, and an operational overhead between 52% and 80% depending on the chosen policy and its complexity.
  authors: Kristof Jannes, Vincent Reniers, Wouter Lenaerts, Bert Lagaisse, Wouter Joosen
  link:
    url: https://doi.org/10.1145/3555776.3577676
    display: Paper DOI
  highlight: 0

- title: "Masking Location Streams in the Presence of Colluding Service Providers"
  # image: rock.jpg
  description: Many service providers rely on location data or streams to offer personalized services. However, reckless release of location streams can have serious privacy implications, especially with respect to sensitive zones, paths and time intervals. Unfortunately, current approaches by mobile platform providers to enhance privacy expose major shortcomings, especially with respect to releasing location information of frequently visited areas and in the presence of colluding service providers that are willing to combine local knowledge to retrieve more accurate information.This paper presents a practical approach to obfuscate location streams in the presence of the aforementioned challenges. Our solution combines multiple technologies and is validated through the development of a novel privacy-friendly location service in Android. It aims to realize a reasonable trade-off between privacy and utility concerns respectively raised by end-users and service providers. Thereby, sensitive locations, zones, paths, timestamps, and time intervals are highly configurable.
  authors: Toon Dehaene, Michiel Willocx, Bert Lagaisse, Vincent Naessens
  link:
    url: https://doi.org/10.1109/EuroSPW59978.2023.00051
    display: Paper DOI
  highlight: 0

- title: "Poster: Privacy-Preserving Heat Map Generation through Spatial and Temporal Local Perturbation"
  # image: rock.jpg
  description: Businesses and governments increasingly apply machine learning and AI techniques for various strategic optimization purposes. Many applications, however, require location data over time of many individuals to train models. Currently, location streams are collected -- often without the end-user's consent or even knowledge -- by means of seemingly innocent smartphone applications that continuously report location data in a background process, raising serious privacy concerns. In this poster, we propose a transparent and privacy-friendly approach that perturbs sensitive location data in two dimensions, namely spatially and temporally. The mechanism can be deployed on mobile devices such that all obfuscation is executed locally, thereby protecting the user even in the presence of an untrustworthy data collector. The viability of the proposed mechanism is demonstrated by generating heat maps and predicting hot spots based on privacy-preserving location streams of many users.
  authors: Toon Dehaene, Michiel Willocx, Bert Lagaisse, Vincent Naessens
  link:
    url: https://doi.org/10.5281/zenodo.8197519
    display: Poster DOI
  highlight: 0

- title: "ZeroTouch: Reinforcing RSS for Secure Geofencing"
  # image: rock.jpg
  description: Geofencing, the virtual demarcation of physical spaces, is widely used for managing the localisation of Internet of Things (IoT) devices. However, traditional localisation techniques face security challenges indoors due to signal interference and susceptibility to spoofing, often requiring extensive calibration or extra hardware, limiting scalability. In this work, we propose ZeroTouch, a machine learning-based system that leverages Received Signal Strength (RSS) measurements from multiple receivers to improve the security of geofencing without introducing additional deployment overhead. While RSS-based localisation is known to have inherent security limitations, we show that by aggregating RSS readings from multiple anchor points and detecting anomalies using an autoencoder model, ZeroTouch provides a practical and automated mechanism for verifying whether a device is inside or outside a defined boundary. Rather than serving as a standalone security mechanism, ZeroTouch enhances existing authentication frameworks by adding an additional zero-touch security layer that operates passively in the background. ZeroTouch eliminates manual calibration, removes the human-in-the-loop element, and simplifies deployment. We evaluate our solution in a realistic simulated environment and demonstrate that it achieves high accuracy in distinguishing between in-room and out-of-room devices, even in strong adversarial settings.
  authors: Nikola Antonijević, Sayon Duttagupta, Dave Singelée, Enrique Argones Rúa, Bart Preneel
  link:
    url: https://doi.org/10.1145/3734436.3734448
    display: Paper DOI
  highlight: 0

- title: "A Survey of Security and Privacy Issues in V2X Communication Systems"
  # image: rock.jpg
  description: Vehicle-to-Everything (V2X) communication is receiving growing attention from industry and academia as multiple pilot projects explore its capabilities and feasibility. With about 50% of global road vehicle exports coming from the European Union (EU), and within the context of EU legislation around security and data protection, V2X initiatives must consider security and privacy aspects across the system stack, in addition to road safety. Contrary to this principle, our survey of relevant standards, research outputs, and EU pilot projects indicates otherwise; we identify multiple security- and privacy-related shortcomings and inconsistencies across the standards. We conduct a root cause analysis of the reasons and difficulties associated with these gaps, and categorize the identified security and privacy issues relative to these root causes. As a result, our comprehensive analysis sheds lights on a number of areas that require improvements in the standards, which are not explicitly identified in related work. Our analysis fills gaps left by other related surveys, which are focused on specific technical areas but do not necessarily point out underlying root issues in standard specifications. We bring forward recommendations to address these gaps for the overall improvement of security and safety in vehicular communication.
  authors: Takahito Yoshizawa, Dave Singelée, Jan Tobias Mühlberg, STÉPHANE Delbruel, Amir Taherkordi, Danny Hughes, Bart Preneel
  link:
    url: https://doi.org/10.1145/3558052
    display: Paper DOI
  highlight: 0

- title: "Security of Distance-Bounding: A Survey"
  # image: rock.jpg
  description: Distance-bounding protocols allow a verifier to both authenticate a prover and evaluate whether the latter is located in his vicinity. These protocols are of particular interest in contactless systems, e.g., electronic payment or access control systems, which are vulnerable to distance-based frauds. This survey analyzes and compares in a unified manner many existing distance-bounding protocols with respect to several key security and complexity features.
  authors: Gildas Avoine, Muhammed Ali Bingol, Ioana Boureanu, Srdjan Capkun, Gerhard Hancke, Suleyman Kardas, Chong Hee Kim, Cedric Lauradoux, Benjamin Martin, Jorge Munilla, Alberto Peinado-Dominguez, Kasper B Rasmussen, Dave Singelée, Aslan Tchamkerten, Rolando Trujillo-Rasua, Serge Vaudenay
